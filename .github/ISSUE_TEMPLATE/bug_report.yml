name: Bug report
description: Report something in the dashboard that behaves incorrectly
title: "[bug] "
labels:
  - bug
body:
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Keep it concrete. A screenshot is often enough with one or two sentences.
      placeholder: "Example: when a subject has two sessions on one day, the multisession x axis collapses them together."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What should have happened instead?
      placeholder: "Example: sessions from the same day should still appear as separate points, just closer together."
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Where is the problem?
      options:
        - sidebar / subject selection
        - date picker / session selection
        - single-session plots
        - multisession plots
        - app startup / CLI
        - other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Optional, but useful when relevant.
      placeholder: "Subject, date, session, screenshot, or any detail that makes this easier to reproduce."
